apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bgd-app-kustomize
  namespace: openshift-gitops
spec:
  destination:
    namespace: bgd-app-kustomize
    server: https://kubernetes.default.svc
  project: default
  source:
    path: openshift-gitops-workshop/content/modules/ROOT/examples/bgdk
    repoURL: https://github.com/tux1980/gitops-hetzner-ocp4
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
